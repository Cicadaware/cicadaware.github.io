<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>    
  
  <header class="round-block">
    <h1><a>{{ site.title }}</a></h1>
  </header>

  <div class="page-container">
    <main class="content">
      {{ content }}
    </main>
  </div>
  <footer class="round-block">
    {% if page.url != "/" %}
      <a href="/" class="home-link">Back to homepage</a>
    {% endif %}
    <p>© {{ site.time | date: "%Y" }} Cicadacore @ Cicadaware</p>
  </footer>

</body>
</html>
