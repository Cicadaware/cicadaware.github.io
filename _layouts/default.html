<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="page-container">
    <header>
      <h1><a>{{ site.title }}</a></h1>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer>
      {% if page.url != "/" %}
      <a href="/"> Back to Homepage</a>
      {% endif %}
      <p>© {{ site.time | date: "%Y" }} Cicadacore @ Cicadaware</p>
    </footer>
  </div>
</body>
</html>
